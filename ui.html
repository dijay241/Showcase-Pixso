<!-- ui.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Frame to PowerPoint</title>
  <!-- PptxGenJS (included) -->
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs/dist/pptxgen.bundle.js"></script>
</head>
<body>

  <script>
    /** @type {any[]} */
    let FRAMES = [];

    // Получаем данные из main
    onmessage = async (event) => {
      const msg = event.data.pluginMessage;

      if (!msg) return;

      if (msg.type === 'AUTO') {
        FRAMES = msg.frames || [];
        window.__FILE_NAME_BASE__ = msg.fileNameBase || 'From-Pixso';
        // Автостарт экспорта
        await doExport();
      }
    };


    async function doExport() {
      const pptx = new PptxGenJS();

      // layout
      const slideW = FRAMES[0] ? FRAMES[0].slideWIn : 10;
      const slideH = FRAMES[0] ? FRAMES[0].slideHIn : 5.625;
      pptx.defineLayout({ name:'PIXSO', width: slideW, height: slideH });
      pptx.layout = 'PIXSO'; // фиксируем пользовательский размер слайда

      // создаём слайды
      for (const f of FRAMES) {
        const slide = pptx.addSlide();
        slide.background = { color: f.bgColorHex };
        // Убираем создание фонового прямоугольника - PowerPoint сам управляет фоном слайда
        // подстрахуемся: если размер слайда не совпадает с фреймом, просто центрируем содержимое «как есть»
        const dx = 0, dy = 0; // можно ввести опцию выравнивания, но по умолчанию 1:1

        // Рекурсивная функция для рендера элементов (включая группы)
        const renderItem = (item) => {
          

          //console.log(item);
          
          if (item.type === 'TEXT') {
            // Простой подход: передаем текст как есть, без дополнительной обработки
            // PptxGenJS сам должен обработать переносы строк
            const runs = item.runs.map(r => ({
              text: r.text,
              options: {
                ...r.options,
                breakLine: false
              }
            }));
            slide.addText(runs, {
              x: item.xIn || 0, 
              y: item.yIn || 0,
              w: item.boxWIn, 
              h: item.boxHIn,
              align: item.align || 'left',
              valign: item.valign || 'top',
              rotate: item.rotate ? Math.round(item.rotate) : 0,
              isTextBox: true,
              // Включаем "Resize shape to fit text"
              autoFit: true,
              margin: 0
            });
          }
          else if (item.type === 'LINE') {
            
            // Настоящая линия: используем правильный синтаксис PptxGenJS
            const lineOpts = {
              x: item.xIn || 0,
              y: item.yIn || 0,
              w: Math.max(0.01, item.wIn || 0.01),
              h: Math.max(0.01, item.hIn || 0.01),
              rotate: item.rotate ? Math.round(item.rotate) : 0,
              line: {
                color: item.strokeHex,
                width: Math.max(0.01, item.strokePt || 0.01),
                dashType: item.dash || 'solid',
                transparency: (1 - item.strokeOpacity) * 100,
                beginArrowType: item.endArrow || 'none',  // Исправлено: beginArrowType = endArrow
                endArrowType: item.beginArrow || 'none'   // Исправлено: endArrowType = beginArrow
              },
            };
            
          
            
            // Для вертикальных линий (w < h) используем специальную обработку
            if (item.wIn < item.hIn) {
              // Вертикальная линия: w должно быть минимальным, h - длиной линии
              lineOpts.w = 0.01; // Минимальная ширина для вертикальной линии
              lineOpts.h = Math.max(0.01, item.hIn || 0.01); // Высота = длина линии
            } else {
              // Горизонтальная линия: h должно быть минимальным, w - длиной линии
              lineOpts.w = Math.max(0.01, item.wIn || 0.01); // Ширина = длина линии
              lineOpts.h = 0.01; // Минимальная высота для горизонтальной линии
            }

            slide.addShape(pptx.shapes.LINE, lineOpts);
            
          }
          else if (item.type === 'SVG') {
            slide.addImage({
              data: item.svgBase64, // svg как image/svg+xml (вектор)
              x: item.xIn || 0, 
              y: item.yIn || 0,
              w: item.wIn || 1,
              h: item.hIn || 1
            });
          }
          else if (item.type === 'IMAGE') {
            slide.addImage({
              data: item.dataBase64,
              x: item.xIn || 0, y: item.yIn || 0,
              w: item.wIn || 1, h: item.hIn || 1,
              rotate: item.rotate ? Math.round(item.rotate) : 0
            });
          }
          // else if (item.type === 'GROUP') {
          //   // Рекурсивно рендерим детей группы
          //   for (const child of item.children) {
          //     renderItem(child, dx, dy);
          //   }
          // }
        };
        
        // Сортируем элементы по zIndex и рендерим
        const sortedItems = [...f.items].sort((a,b) => a.zIndex - b.zIndex);
        for (const item of sortedItems) {
          renderItem(item);
        }
      } // закрываем цикл for (const f of FRAMES)
      
      const base = window.__FILE_NAME_BASE__ || 'From-Pixso';
      await pptx.writeFile({ fileName: base + '.pptx' }); // возвращает Promise
      parent.postMessage({ pluginMessage: { type:'done' }}, '*');
      // Закрываем плагин через небольшую задержку
      setTimeout(() => {
        parent.postMessage({ pluginMessage: { type:'close' }}, '*');
      }, 1000);
    }

  </script>
</body>
</html>
